# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:
  configurationVersion: 0.2.0
  resources:
    # ============================================================
    # Scoop Package Manager
    # ============================================================

    # Bootstrap Scoop
    - resource: PSDscResources/Script
      id: ScoopBootstrap
      directives:
        description: Install Scoop package manager
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\shims\scoop.cmd"
        SetScript: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\shims\scoop.cmd") { 'Installed' } else { 'NotInstalled' } }

    # Add extras bucket (needed for lazygit)
    - resource: PSDscResources/Script
      id: ScoopBucketExtras
      dependsOn:
        - ScoopBootstrap
      directives:
        description: Add Scoop extras bucket
        allowPrerelease: true
      settings:
        TestScript: |
          $buckets = & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket list 2>&1 | Out-String
          $buckets -match 'extras'
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket add extras
        GetScript: |
          $buckets = & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket list 2>&1 | Out-String
          @{ Result = if ($buckets -match 'extras') { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # Scoop CLI Tools
    # ============================================================

    # Core tools: aria2, git, chezmoi
    - resource: PSDscResources/Script
      id: ScoopCoreTools
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install core CLI tools via Scoop: aria2, git, chezmoi"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('aria2', 'git', 'chezmoi')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install aria2 git chezmoi
        GetScript: |
          $apps = @('aria2', 'git', 'chezmoi')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Neovim and its build/runtime dependencies
    - resource: PSDscResources/Script
      id: ScoopNeovimDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Neovim and dependencies via Scoop: neovim, llvm, nodejs, fzf, ripgrep"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('neovim', 'llvm', 'nodejs', 'fzf', 'ripgrep')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install neovim llvm nodejs fzf ripgrep
        GetScript: |
          $apps = @('neovim', 'llvm', 'nodejs', 'fzf', 'ripgrep')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Yazi and its direct dependencies
    - resource: PSDscResources/Script
      id: ScoopYaziDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Yazi and dependencies via Scoop: yazi, ffmpeg, 7zip, jq, poppler, fd, imagemagick, zoxide"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('yazi', 'ffmpeg', '7zip', 'jq', 'poppler', 'fd', 'imagemagick', 'zoxide')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install yazi ffmpeg 7zip jq poppler fd imagemagick zoxide
        GetScript: |
          $apps = @('yazi', 'ffmpeg', '7zip', 'jq', 'poppler', 'fd', 'imagemagick', 'zoxide')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Yazi plugin dependencies
    - resource: PSDscResources/Script
      id: ScoopYaziPluginDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Yazi plugin dependencies via Scoop: exiftool, eza, glow, hexyl, mediainfo"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('exiftool', 'eza', 'glow', 'hexyl', 'mediainfo')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install exiftool eza glow hexyl mediainfo
        GetScript: |
          $apps = @('exiftool', 'eza', 'glow', 'hexyl', 'mediainfo')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Shell prompt, git tools, and system info
    - resource: PSDscResources/Script
      id: ScoopShellAndGitTools
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install shell and git tools via Scoop: starship, bat, delta, difftastic, less, gitui, fastfetch"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('starship', 'bat', 'delta', 'difftastic', 'less', 'gitui', 'fastfetch')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install starship bat delta difftastic less gitui fastfetch
        GetScript: |
          $apps = @('starship', 'bat', 'delta', 'difftastic', 'less', 'gitui', 'fastfetch')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Lazygit (from extras bucket) and perl (used by AppData/Local/lazygit/diff.bat
    # to rewrite temp paths in the diff stream before piping to delta)
    - resource: PSDscResources/Script
      id: ScoopLazygit
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install lazygit and perl via Scoop (lazygit from extras, perl required by diff.bat)"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('lazygit', 'perl')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install lazygit perl
        GetScript: |
          $apps = @('lazygit', 'perl')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # moor pager (from extras bucket, used as $PAGER in PowerShell profile)
    - resource: PSDscResources/Script
      id: ScoopMoor
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install moor pager via Scoop (extras bucket)"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\moor\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install moor
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\moor\current") { 'Installed' } else { 'NotInstalled' } }

    # age encryption (from extras bucket, required by chezmoi for secret management)
    - resource: PSDscResources/Script
      id: ScoopAge
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install age encryption via Scoop (extras bucket)"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\age\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install age
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\age\current") { 'Installed' } else { 'NotInstalled' } }

    # rtk (Rust Token Killer) — CLI proxy that compresses dev-command
    # output before it reaches an LLM. Native Windows uses CLAUDE.md /
    # AGENTS.md injection (no auto-rewrite hook), so the agent must
    # manually prefix commands with `rtk`. See dot_claude/RTK.md and
    # dot_codex/RTK.md for the awareness instructions.
    - resource: PSDscResources/Script
      id: ScoopRtk
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install rtk CLI proxy via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\rtk\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install rtk
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\rtk\current") { 'Installed' } else { 'NotInstalled' } }

    # opencode (AI coding agent) — config lives at dot_config/opencode/opencode.json
    # and registers router-maestro + litellm providers plus brave-search /
    # context7 / github MCP servers, matching the nixfiles llm-agents module.
    - resource: PSDscResources/Script
      id: ScoopOpencode
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install opencode AI coding agent via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\opencode\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install opencode
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\opencode\current") { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # PowerShell Modules
    # ============================================================

    # PSFzf — fuzzy command-line history and file completion bindings
    # backed by fzf. The PowerShell profile imports this module and binds
    # Ctrl+R to fuzzy reverse-history search; see
    # readonly_Documents/PowerShell/Microsoft.PowerShell_profile.ps1.tmpl.
    - resource: PSDscResources/Script
      id: InstallPSFzfModule
      directives:
        description: "Install PSFzf PowerShell module from PSGallery"
        allowPrerelease: true
      settings:
        TestScript: |
          $null -ne (Get-Module -ListAvailable -Name PSFzf)
        SetScript: |
          if (-not (Get-PackageProvider -Name NuGet -ListAvailable -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
          }
          Install-Module -Name PSFzf -Scope CurrentUser -Force -AcceptLicense
        GetScript: |
          @{ Result = if ($null -ne (Get-Module -ListAvailable -Name PSFzf)) { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # WinGet GUI Apps
    # ============================================================

    # PowerShell (pwsh)
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetPowerShell
      directives:
        description: Install PowerShell (pwsh) via WinGet
        allowPrerelease: true
      settings:
        id: Microsoft.PowerShell
        source: winget

    # WezTerm
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetWezTerm
      directives:
        description: Install WezTerm terminal emulator
        allowPrerelease: true
      settings:
        id: wez.wezterm
        source: winget

    # Alacritty
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetAlacritty
      directives:
        description: Install Alacritty terminal emulator
        allowPrerelease: true
      settings:
        id: Alacritty.Alacritty
        source: winget

    # Rio
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetRio
      directives:
        description: Install Rio terminal emulator
        allowPrerelease: true
      settings:
        id: raphamorim.rio
        source: winget

    # Neovide
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetNeovide
      directives:
        description: Install Neovide GUI for Neovim
        allowPrerelease: true
      settings:
        id: Neovide.Neovide
        source: winget

    # Windows Terminal Preview
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetWindowsTerminalPreview
      directives:
        description: Install Windows Terminal Preview
        allowPrerelease: true
      settings:
        id: Microsoft.WindowsTerminal.Preview
        source: winget

    # ============================================================
    # Fonts (per-user, no admin required)
    # ============================================================

    # Installs three font packs to %LOCALAPPDATA%\Microsoft\Windows\Fonts
    # and registers them under HKCU. Tracks the latest GitHub release for
    # each pack via a .version marker file; re-downloads and replaces
    # whenever upstream publishes a new tag.
    #   - Iosevkata (vanilla)           -> ningw42/Iosevkata, .zip
    #   - IosevkataSymbolsNerdFont      -> ningw42/Iosevkata, .zip
    #   - SarasaFixedSC (TTF, hinted)   -> be5invis/Sarasa-Gothic, .7z
    # Depends on ScoopYaziDeps because the Sarasa archive is .7z and we
    # extract with scoop's 7z.exe.
    - resource: PSDscResources/Script
      id: InstallFonts
      dependsOn:
        - ScoopYaziDeps
      directives:
        description: "Install latest Iosevkata, IosevkataSymbolsNerdFont, and SarasaFixedSC fonts (per-user)"
        allowPrerelease: true
      settings:
        TestScript: |
          $fontPacks = @(
            @{ Name = 'Iosevkata';                Owner = 'ningw42';  Repo = 'Iosevkata' }
            @{ Name = 'IosevkataSymbolsNerdFont'; Owner = 'ningw42';  Repo = 'Iosevkata' }
            @{ Name = 'SarasaFixedSC';            Owner = 'be5invis'; Repo = 'Sarasa-Gothic' }
          )
          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $allCurrent = $true
          foreach ($fp in $fontPacks) {
            $markerPath = Join-Path $base ("{0}\.version" -f $fp.Name)
            if (-not (Test-Path $markerPath)) { $allCurrent = $false; break }
            try {
              $latest = (Invoke-RestMethod -Uri "https://api.github.com/repos/$($fp.Owner)/$($fp.Repo)/releases/latest" -UseBasicParsing).tag_name
              $installed = (Get-Content $markerPath -Raw).Trim()
              if ($installed -ne $latest) { $allCurrent = $false; break }
            } catch {
              # GitHub unreachable: leave existing install alone rather than churn.
            }
          }
          $allCurrent
        SetScript: |
          $ErrorActionPreference = 'Stop'
          $fontPacks = @(
            @{ Name = 'Iosevkata';                Owner = 'ningw42';  Repo = 'Iosevkata';    AssetPattern = '^Iosevkata-v[0-9.]+\.zip$';                Type = 'zip' }
            @{ Name = 'IosevkataSymbolsNerdFont'; Owner = 'ningw42';  Repo = 'Iosevkata';    AssetPattern = '^IosevkataSymbolsNerdFont-v[0-9.]+\.zip$'; Type = 'zip' }
            @{ Name = 'SarasaFixedSC';            Owner = 'be5invis'; Repo = 'Sarasa-Gothic';AssetPattern = '^SarasaFixedSC-TTF-[0-9.]+\.7z$';          Type = '7z'  }
          )
          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $regKey = 'HKCU:\Software\Microsoft\Windows NT\CurrentVersion\Fonts'
          $sevenZip = "$env:USERPROFILE\scoop\shims\7z.exe"
          New-Item -ItemType Directory -Path $base -Force | Out-Null
          if (-not (Test-Path $regKey)) { New-Item -Path $regKey -Force | Out-Null }

          foreach ($fp in $fontPacks) {
            $packDir = Join-Path $base $fp.Name
            $marker  = Join-Path $packDir '.version'

            $release = Invoke-RestMethod -Uri "https://api.github.com/repos/$($fp.Owner)/$($fp.Repo)/releases/latest" -UseBasicParsing
            $latest  = $release.tag_name
            if ((Test-Path $marker) -and ((Get-Content $marker -Raw).Trim() -eq $latest)) { continue }

            $asset = $release.assets | Where-Object { $_.name -match $fp.AssetPattern } | Select-Object -First 1
            if (-not $asset) { throw "No asset matching $($fp.AssetPattern) in $($fp.Owner)/$($fp.Repo) $latest" }

            # Unregister any previously-installed files in this pack, then wipe the dir.
            if (Test-Path $packDir) {
              $regVals = Get-ItemProperty -Path $regKey
              foreach ($prop in $regVals.PSObject.Properties) {
                if ($prop.Name -in 'PSPath','PSParentPath','PSChildName','PSDrive','PSProvider') { continue }
                if ($prop.Value -like "$packDir\*") {
                  Remove-ItemProperty -Path $regKey -Name $prop.Name -ErrorAction SilentlyContinue
                }
              }
              Remove-Item -Path $packDir -Recurse -Force
            }
            New-Item -ItemType Directory -Path $packDir -Force | Out-Null

            $tmp = Join-Path $env:TEMP "fontdl-$($fp.Name)"
            if (Test-Path $tmp) { Remove-Item -Path $tmp -Recurse -Force }
            New-Item -ItemType Directory -Path $tmp -Force | Out-Null
            $archive = Join-Path $tmp $asset.name
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive -UseBasicParsing

            $extractDir = Join-Path $tmp 'extract'
            New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
            if ($fp.Type -eq 'zip') {
              Expand-Archive -Path $archive -DestinationPath $extractDir -Force
            } else {
              & $sevenZip x $archive "-o$extractDir" -y | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "7z extraction failed for $($fp.Name)" }
            }

            $fontFiles = Get-ChildItem -Path $extractDir -Recurse -Include *.ttf,*.otf,*.ttc
            foreach ($f in $fontFiles) {
              $dest = Join-Path $packDir $f.Name
              Copy-Item -Path $f.FullName -Destination $dest -Force
              $kind = if ($f.Extension.ToLower() -eq '.otf') { 'OpenType' } else { 'TrueType' }
              $regName = "$([System.IO.Path]::GetFileNameWithoutExtension($f.Name)) ($kind)"
              New-ItemProperty -Path $regKey -Name $regName -Value $dest -PropertyType String -Force | Out-Null
            }

            Set-Content -Path $marker -Value $latest -NoNewline
            Remove-Item -Path $tmp -Recurse -Force -ErrorAction SilentlyContinue
          }
        GetScript: |
          $names = @('Iosevkata', 'IosevkataSymbolsNerdFont', 'SarasaFixedSC')
          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $missing = $names | Where-Object { -not (Test-Path (Join-Path $base "$_\.version")) }
          @{ Result = if ($missing.Count -eq 0) { 'Installed' } else { 'NotInstalled' } }
