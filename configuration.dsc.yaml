# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:
  configurationVersion: 0.2.0
  resources:
    # ============================================================
    # Scoop Package Manager
    # ============================================================

    # Bootstrap Scoop
    - resource: PSDscResources/Script
      id: ScoopBootstrap
      directives:
        description: Install Scoop package manager
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\shims\scoop.cmd"
        SetScript: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          Invoke-RestMethod -Uri https://get.scoop.sh | Invoke-Expression
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\shims\scoop.cmd") { 'Installed' } else { 'NotInstalled' } }

    # Add extras bucket (needed for lazygit)
    - resource: PSDscResources/Script
      id: ScoopBucketExtras
      dependsOn:
        - ScoopBootstrap
      directives:
        description: Add Scoop extras bucket
        allowPrerelease: true
      settings:
        TestScript: |
          $buckets = & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket list 2>&1 | Out-String
          $buckets -match 'extras'
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket add extras
        GetScript: |
          $buckets = & "$env:USERPROFILE\scoop\shims\scoop.cmd" bucket list 2>&1 | Out-String
          @{ Result = if ($buckets -match 'extras') { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # Scoop CLI Tools
    # ============================================================

    # Core tools: aria2, git, chezmoi
    - resource: PSDscResources/Script
      id: ScoopCoreTools
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install core CLI tools via Scoop: aria2, git, chezmoi"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('aria2', 'git', 'chezmoi')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install aria2 git chezmoi
        GetScript: |
          $apps = @('aria2', 'git', 'chezmoi')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Neovim and its build/runtime dependencies
    - resource: PSDscResources/Script
      id: ScoopNeovimDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Neovim and dependencies via Scoop: neovim, llvm, nodejs, fzf, ripgrep"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('neovim', 'llvm', 'nodejs', 'fzf', 'ripgrep')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install neovim llvm nodejs fzf ripgrep
        GetScript: |
          $apps = @('neovim', 'llvm', 'nodejs', 'fzf', 'ripgrep')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Yazi and its direct dependencies
    - resource: PSDscResources/Script
      id: ScoopYaziDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Yazi and dependencies via Scoop: yazi, ffmpeg, 7zip, jq, poppler, fd, imagemagick, zoxide"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('yazi', 'ffmpeg', '7zip', 'jq', 'poppler', 'fd', 'imagemagick', 'zoxide')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install yazi ffmpeg 7zip jq poppler fd imagemagick zoxide
        GetScript: |
          $apps = @('yazi', 'ffmpeg', '7zip', 'jq', 'poppler', 'fd', 'imagemagick', 'zoxide')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Yazi plugin dependencies
    - resource: PSDscResources/Script
      id: ScoopYaziPluginDeps
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install Yazi plugin dependencies via Scoop: exiftool, eza, glow, hexyl, mediainfo"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('exiftool', 'eza', 'glow', 'hexyl', 'mediainfo')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install exiftool eza glow hexyl mediainfo
        GetScript: |
          $apps = @('exiftool', 'eza', 'glow', 'hexyl', 'mediainfo')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Shell prompt, git tools, and system info
    - resource: PSDscResources/Script
      id: ScoopShellAndGitTools
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install shell and git tools via Scoop: starship, bat, delta, difftastic, less, gitui, gh, fastfetch"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('starship', 'bat', 'delta', 'difftastic', 'less', 'gitui', 'gh', 'fastfetch')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install starship bat delta difftastic less gitui gh fastfetch
        GetScript: |
          $apps = @('starship', 'bat', 'delta', 'difftastic', 'less', 'gitui', 'gh', 'fastfetch')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # Lazygit (from extras bucket) and perl (used by AppData/Local/lazygit/diff.bat
    # to rewrite temp paths in the diff stream before piping to delta)
    - resource: PSDscResources/Script
      id: ScoopLazygit
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install lazygit and perl via Scoop (lazygit from extras, perl required by diff.bat)"
        allowPrerelease: true
      settings:
        TestScript: |
          $apps = @('lazygit', 'perl')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install lazygit perl
        GetScript: |
          $apps = @('lazygit', 'perl')
          $scoopApps = "$env:USERPROFILE\scoop\apps"
          $allInstalled = @($apps | ForEach-Object { Test-Path "$scoopApps\$_\current" } | Where-Object { -not $_ }).Count -eq 0
          @{ Result = if ($allInstalled) { 'Installed' } else { 'NotInstalled' } }

    # moor pager (from extras bucket, used as $PAGER in PowerShell profile)
    - resource: PSDscResources/Script
      id: ScoopMoor
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install moor pager via Scoop (extras bucket)"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\moor\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install moor
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\moor\current") { 'Installed' } else { 'NotInstalled' } }

    # age encryption (from extras bucket, required by chezmoi for secret management)
    - resource: PSDscResources/Script
      id: ScoopAge
      dependsOn:
        - ScoopBucketExtras
      directives:
        description: "Install age encryption via Scoop (extras bucket)"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\age\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install age
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\age\current") { 'Installed' } else { 'NotInstalled' } }

    # rtk (Rust Token Killer) — CLI proxy that compresses dev-command
    # output before it reaches an LLM. Native Windows uses CLAUDE.md /
    # AGENTS.md injection (no auto-rewrite hook), so the agent must
    # manually prefix commands with `rtk`. See dot_claude/RTK.md and
    # dot_codex/RTK.md for the awareness instructions.
    - resource: PSDscResources/Script
      id: ScoopRtk
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install rtk CLI proxy via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\rtk\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install rtk
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\rtk\current") { 'Installed' } else { 'NotInstalled' } }

    # opencode (AI coding agent) — config lives at dot_config/opencode/opencode.json
    # and registers router-maestro + litellm providers plus brave-search /
    # context7 / github MCP servers, matching the nixfiles llm-agents module.
    - resource: PSDscResources/Script
      id: ScoopOpencode
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install opencode AI coding agent via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\opencode\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install opencode
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\opencode\current") { 'Installed' } else { 'NotInstalled' } }

    # GitHub Copilot CLI — config lives at dot_copilot/ (settings.json: statusline
    # + native-footer disables; mcp-config.json: brave/context7/exa). The RTK
    # hook + copilot-instructions.md are generated by run_onchange_rtk-init
    # (`rtk init -g --copilot`). From the default `main` bucket.
    - resource: PSDscResources/Script
      id: ScoopCopilotCli
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install GitHub Copilot CLI via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\copilot-cli\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install copilot-cli
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\copilot-cli\current") { 'Installed' } else { 'NotInstalled' } }

    # everything-cli (es) — command-line interface to the voidtools Everything
    # search engine (the GUI ships via WinGetEverything). Queries the running
    # Everything service for instant file-name search from the shell.
    - resource: PSDscResources/Script
      id: ScoopEverythingCli
      dependsOn:
        - ScoopBootstrap
      directives:
        description: "Install everything-cli (es) via Scoop"
        allowPrerelease: true
      settings:
        TestScript: |
          Test-Path "$env:USERPROFILE\scoop\apps\everything-cli\current"
        SetScript: |
          & "$env:USERPROFILE\scoop\shims\scoop.cmd" install everything-cli
        GetScript: |
          @{ Result = if (Test-Path "$env:USERPROFILE\scoop\apps\everything-cli\current") { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # PowerShell Modules
    # ============================================================

    # PSFzf — fuzzy command-line history and file completion bindings
    # backed by fzf. The PowerShell profile imports this module and binds
    # Ctrl+R to fuzzy reverse-history search; see
    # readonly_Documents/PowerShell/Microsoft.PowerShell_profile.ps1.tmpl.
    - resource: PSDscResources/Script
      id: InstallPSFzfModule
      directives:
        description: "Install PSFzf PowerShell module from PSGallery"
        allowPrerelease: true
      settings:
        TestScript: |
          $null -ne (Get-Module -ListAvailable -Name PSFzf)
        SetScript: |
          if (-not (Get-PackageProvider -Name NuGet -ListAvailable -ErrorAction SilentlyContinue)) {
            Install-PackageProvider -Name NuGet -Force -Scope CurrentUser | Out-Null
          }
          Install-Module -Name PSFzf -Scope CurrentUser -Force -AcceptLicense
        GetScript: |
          @{ Result = if ($null -ne (Get-Module -ListAvailable -Name PSFzf)) { 'Installed' } else { 'NotInstalled' } }

    # ============================================================
    # WinGet GUI Apps
    # ============================================================

    # PowerShell (pwsh)
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetPowerShell
      directives:
        description: Install PowerShell (pwsh) via WinGet
        allowPrerelease: true
      settings:
        id: Microsoft.PowerShell
        source: winget

    # WezTerm
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetWezTerm
      directives:
        description: Install WezTerm terminal emulator
        allowPrerelease: true
      settings:
        id: wez.wezterm
        source: winget

    # Alacritty
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetAlacritty
      directives:
        description: Install Alacritty terminal emulator
        allowPrerelease: true
      settings:
        id: Alacritty.Alacritty
        source: winget

    # Rio
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetRio
      directives:
        description: Install Rio terminal emulator
        allowPrerelease: true
      settings:
        id: raphamorim.rio
        source: winget

    # Neovide
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetNeovide
      directives:
        description: Install Neovide GUI for Neovim
        allowPrerelease: true
      settings:
        id: Neovide.Neovide
        source: winget

    # Windows Terminal Preview
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetWindowsTerminalPreview
      directives:
        description: Install Windows Terminal Preview
        allowPrerelease: true
      settings:
        id: Microsoft.WindowsTerminal.Preview
        source: winget

    # Everything (voidtools) — instant file-name search
    - resource: Microsoft.WinGet.DSC/WinGetPackage
      id: WinGetEverything
      directives:
        description: Install Everything file search via WinGet
        allowPrerelease: true
      settings:
        id: voidtools.Everything
        source: winget

    # ============================================================
    # Fonts (per-user, no admin required)
    # ============================================================

    # Installs per-user font packs to %LOCALAPPDATA%\Microsoft\Windows\Fonts
    # and registers them under HKCU. Each pack is a separate DSC resource so
    # one failure (e.g. a transient GitHub outage) doesn't block the others.
    # Tracks the latest GitHub release per pack via a .version marker file;
    # re-downloads and replaces whenever upstream publishes a new tag.
    #   - Iosevkata (vanilla)           -> ningw42/Iosevkata, .zip
    #   - IosevkataSymbolsNerdFont      -> ningw42/Iosevkata, .zip
    #   - SarasaFixedSC (TTF, hinted)   -> be5invis/Sarasa-Gothic, .7z
    #
    # In-use font handling: each existing font FILE is renamed to
    # "<file>.legacy-<token>" before the new file is written under the canonical
    # name. The font loader opens files with FILE_SHARE_DELETE (so an in-use file
    # can be renamed/deleted) but not FILE_SHARE_WRITE (so it can't be overwritten
    # in place), and a directory can't be renamed at all while files inside are
    # open. Renaming each file aside frees its name for the new version and mirrors
    # what the Windows "replace this font?" flow does. Registry values are repointed
    # (-Force), entries whose target no longer exists are dropped, and legacy files
    # (delete-pending while still mapped) are reaped best-effort — they disappear
    # once the holding application (WezTerm, Windows Terminal, Zed, etc.) closes.

    # Iosevkata + IosevkataSymbolsNerdFont ship from the same repo under the
    # same release tag, so a single resource fetches the release once and
    # installs both packs into their own dirs / .version markers.
    - resource: PSDscResources/Script
      id: InstallFontIosevkata
      dependsOn:
        - ScoopShellAndGitTools
      directives:
        description: "Install latest Iosevkata and IosevkataSymbolsNerdFont (per-user)"
        allowPrerelease: true
      settings:
        TestScript: |
          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $gh = "$env:USERPROFILE\scoop\shims\gh.exe"
          $markers = @('Iosevkata', 'IosevkataSymbolsNerdFont') |
            ForEach-Object { Join-Path $base "$_\.version" }
          if ($markers | Where-Object { -not (Test-Path $_) }) { return $false }
          try {
            # Authenticated GitHub call via gh (5000/hr) instead of anonymous
            # Invoke-RestMethod (60/hr/IP). The anonymous limit is easily exhausted
            # by repeated test/apply runs; a 403 then falls into the catch below and
            # silently reports "in state" even when the local marker is stale.
            $latest = (& $gh api 'repos/ningw42/Iosevkata/releases/latest' --jq '.tag_name' 2>$null)
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($latest)) { throw 'gh api failed' }
            $latest = $latest.Trim()
            -not ($markers | Where-Object { (Get-Content $_ -Raw).Trim() -ne $latest })
          } catch {
            # gh not authenticated or GitHub unreachable: leave existing install
            # alone rather than churn.
            $true
          }
        SetScript: |
          $ErrorActionPreference = 'Stop'
          $Owner = 'ningw42'; $Repo = 'Iosevkata'
          $gh = "$env:USERPROFILE\scoop\shims\gh.exe"
          $packs = @(
            @{ Name = 'Iosevkata';                AssetPattern = '^Iosevkata-v[0-9.]+\.zip$' }
            @{ Name = 'IosevkataSymbolsNerdFont'; AssetPattern = '^IosevkataSymbolsNerdFont-v[0-9.]+\.zip$' }
          )

          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $regKey = 'HKCU:\Software\Microsoft\Windows NT\CurrentVersion\Fonts'
          New-Item -ItemType Directory -Path $base -Force | Out-Null
          if (-not (Test-Path $regKey)) { New-Item -Path $regKey -Force | Out-Null }

          # Single release fetch shared across both packs, authenticated via gh
          # (5000/hr) to avoid the 60/hr/IP anonymous API limit.
          $json = & $gh api "repos/$Owner/$Repo/releases/latest" 2>$null | Out-String
          if ($LASTEXITCODE -ne 0) { throw "gh api failed for $Owner/$Repo" }
          $release = $json | ConvertFrom-Json
          $latest  = $release.tag_name

          foreach ($p in $packs) {
            $Name    = $p.Name
            $packDir = Join-Path $base $Name
            $marker  = Join-Path $packDir '.version'
            if ((Test-Path $marker) -and ((Get-Content $marker -Raw).Trim() -eq $latest)) { continue }

            $asset = $release.assets | Where-Object { $_.name -match $p.AssetPattern } | Select-Object -First 1
            if (-not $asset) { throw "No asset matching $($p.AssetPattern) in $Owner/$Repo $latest" }

            # Download + extract first, so we don't disturb the existing install on failure.
            $tmp = Join-Path $env:TEMP "fontdl-$Name-$(Get-Random)"
            New-Item -ItemType Directory -Path $tmp -Force | Out-Null
            try {
              $archive = Join-Path $tmp $asset.name
              Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive -UseBasicParsing

              $extractDir = Join-Path $tmp 'extract'
              New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
              Expand-Archive -Path $archive -DestinationPath $extractDir -Force

              # Replace per-FILE, not per-directory. The font loader opens files with
              # FILE_SHARE_DELETE (so an in-use file can be renamed/deleted) but not
              # FILE_SHARE_WRITE (so it can't be overwritten in place), and a directory
              # can't be renamed at all while files inside are open. So rename each
              # existing font file aside, drop the new file in under the canonical name,
              # and re-register it -- this is what the Windows "replace this font?" flow
              # does, and it works while the font is loaded by a running app.
              New-Item -ItemType Directory -Path $packDir -Force | Out-Null
              $tok = "$(Get-Date -Format 'yyyyMMddHHmmss')-$(Get-Random)"
              Get-ChildItem -Path $packDir -File -ErrorAction SilentlyContinue |
                Where-Object { $_.Extension.ToLower() -in '.ttf','.otf','.ttc' } |
                ForEach-Object { Rename-Item -LiteralPath $_.FullName -NewName "$($_.Name).legacy-$tok" }

              $fontFiles = Get-ChildItem -Path $extractDir -Recurse -Include *.ttf,*.otf,*.ttc
              foreach ($f in $fontFiles) {
                $dest = Join-Path $packDir $f.Name
                Copy-Item -Path $f.FullName -Destination $dest -Force
                $kind = if ($f.Extension.ToLower() -eq '.otf') { 'OpenType' } else { 'TrueType' }
                $regName = "$([System.IO.Path]::GetFileNameWithoutExtension($f.Name)) ($kind)"
                New-ItemProperty -Path $regKey -Name $regName -Value $dest -PropertyType String -Force | Out-Null
              }

              Set-Content -Path $marker -Value $latest -NoNewline

              # Drop registry entries whose target file no longer exists (a style dropped
              # upstream, or a renamed-aside legacy file we never registered).
              $regVals = Get-ItemProperty -Path $regKey
              foreach ($prop in $regVals.PSObject.Properties) {
                if ($prop.Name -in 'PSPath','PSParentPath','PSChildName','PSDrive','PSProvider') { continue }
                if ($prop.Value -like "$packDir\*" -and -not (Test-Path -LiteralPath $prop.Value)) {
                  Remove-ItemProperty -Path $regKey -Name $prop.Name -ErrorAction SilentlyContinue
                }
              }

              # Best-effort reap of legacy font files (this/prior runs) plus any leftover
              # legacy dirs from the old per-directory scheme. Files still mapped by a
              # running app are delete-pending (FILE_SHARE_DELETE) and vanish on close.
              Get-ChildItem -Path $packDir -File -Filter '*.legacy-*' -ErrorAction SilentlyContinue |
                ForEach-Object { Remove-Item -LiteralPath $_.FullName -Force -ErrorAction SilentlyContinue }
              Get-ChildItem -Path $base -Directory -Filter "$Name.legacy-*" -ErrorAction SilentlyContinue |
                ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
            } finally {
              Remove-Item -Path $tmp -Recurse -Force -ErrorAction SilentlyContinue
            }
          }
        GetScript: |
          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $missing = @('Iosevkata', 'IosevkataSymbolsNerdFont') |
            Where-Object { -not (Test-Path (Join-Path $base "$_\.version")) }
          @{ Result = if ($missing.Count -eq 0) { 'Installed' } else { 'NotInstalled' } }

    # SarasaFixedSC ships as .7z; needs scoop's 7z.exe shim via ScoopYaziDeps.
    - resource: PSDscResources/Script
      id: InstallFontSarasaFixedSC
      dependsOn:
        - ScoopYaziDeps
        - ScoopShellAndGitTools
      directives:
        description: "Install latest SarasaFixedSC (per-user)"
        allowPrerelease: true
      settings:
        TestScript: |
          $markerPath = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts\SarasaFixedSC\.version'
          $gh = "$env:USERPROFILE\scoop\shims\gh.exe"
          if (-not (Test-Path $markerPath)) { return $false }
          try {
            # Authenticated via gh (5000/hr) instead of anonymous (60/hr/IP).
            $latest = (& $gh api 'repos/be5invis/Sarasa-Gothic/releases/latest' --jq '.tag_name' 2>$null)
            if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($latest)) { throw 'gh api failed' }
            (Get-Content $markerPath -Raw).Trim() -eq $latest.Trim()
          } catch {
            $true
          }
        SetScript: |
          $ErrorActionPreference = 'Stop'
          $Name = 'SarasaFixedSC'; $Owner = 'be5invis'; $Repo = 'Sarasa-Gothic'
          $AssetPattern = '^SarasaFixedSC-TTF-[0-9.]+\.7z$'; $ArchiveType = '7z'

          $base = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts'
          $regKey = 'HKCU:\Software\Microsoft\Windows NT\CurrentVersion\Fonts'
          $sevenZip = "$env:USERPROFILE\scoop\shims\7z.exe"
          $gh = "$env:USERPROFILE\scoop\shims\gh.exe"
          New-Item -ItemType Directory -Path $base -Force | Out-Null
          if (-not (Test-Path $regKey)) { New-Item -Path $regKey -Force | Out-Null }

          $packDir = Join-Path $base $Name
          $marker  = Join-Path $packDir '.version'

          $json = & $gh api "repos/$Owner/$Repo/releases/latest" 2>$null | Out-String
          if ($LASTEXITCODE -ne 0) { throw "gh api failed for $Owner/$Repo" }
          $release = $json | ConvertFrom-Json
          $latest  = $release.tag_name
          if ((Test-Path $marker) -and ((Get-Content $marker -Raw).Trim() -eq $latest)) { return }

          $asset = $release.assets | Where-Object { $_.name -match $AssetPattern } | Select-Object -First 1
          if (-not $asset) { throw "No asset matching $AssetPattern in $Owner/$Repo $latest" }

          $tmp = Join-Path $env:TEMP "fontdl-$Name-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmp -Force | Out-Null
          try {
            $archive = Join-Path $tmp $asset.name
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive -UseBasicParsing

            $extractDir = Join-Path $tmp 'extract'
            New-Item -ItemType Directory -Path $extractDir -Force | Out-Null
            if ($ArchiveType -eq 'zip') {
              Expand-Archive -Path $archive -DestinationPath $extractDir -Force
            } else {
              & $sevenZip x $archive "-o$extractDir" -y | Out-Null
              if ($LASTEXITCODE -ne 0) { throw "7z extraction failed for $Name" }
            }

            # Replace per-FILE, not per-directory (see Iosevkata above): rename each
            # existing font file aside, write the new file under the canonical name,
            # re-register. Works while the font is loaded by a running app.
            New-Item -ItemType Directory -Path $packDir -Force | Out-Null
            $tok = "$(Get-Date -Format 'yyyyMMddHHmmss')-$(Get-Random)"
            Get-ChildItem -Path $packDir -File -ErrorAction SilentlyContinue |
              Where-Object { $_.Extension.ToLower() -in '.ttf','.otf','.ttc' } |
              ForEach-Object { Rename-Item -LiteralPath $_.FullName -NewName "$($_.Name).legacy-$tok" }

            $fontFiles = Get-ChildItem -Path $extractDir -Recurse -Include *.ttf,*.otf,*.ttc
            foreach ($f in $fontFiles) {
              $dest = Join-Path $packDir $f.Name
              Copy-Item -Path $f.FullName -Destination $dest -Force
              $kind = if ($f.Extension.ToLower() -eq '.otf') { 'OpenType' } else { 'TrueType' }
              $regName = "$([System.IO.Path]::GetFileNameWithoutExtension($f.Name)) ($kind)"
              New-ItemProperty -Path $regKey -Name $regName -Value $dest -PropertyType String -Force | Out-Null
            }

            Set-Content -Path $marker -Value $latest -NoNewline

            # Drop registry entries whose target file no longer exists.
            $regVals = Get-ItemProperty -Path $regKey
            foreach ($prop in $regVals.PSObject.Properties) {
              if ($prop.Name -in 'PSPath','PSParentPath','PSChildName','PSDrive','PSProvider') { continue }
              if ($prop.Value -like "$packDir\*" -and -not (Test-Path -LiteralPath $prop.Value)) {
                Remove-ItemProperty -Path $regKey -Name $prop.Name -ErrorAction SilentlyContinue
              }
            }

            # Best-effort reap of legacy files plus any leftover legacy dirs from the old
            # scheme; files still mapped are delete-pending and vanish when the app closes.
            Get-ChildItem -Path $packDir -File -Filter '*.legacy-*' -ErrorAction SilentlyContinue |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Force -ErrorAction SilentlyContinue }
            Get-ChildItem -Path $base -Directory -Filter "$Name.legacy-*" -ErrorAction SilentlyContinue |
              ForEach-Object { Remove-Item -LiteralPath $_.FullName -Recurse -Force -ErrorAction SilentlyContinue }
          } finally {
            Remove-Item -Path $tmp -Recurse -Force -ErrorAction SilentlyContinue
          }
        GetScript: |
          $markerPath = Join-Path $env:LOCALAPPDATA 'Microsoft\Windows\Fonts\SarasaFixedSC\.version'
          @{ Result = if (Test-Path $markerPath) { 'Installed' } else { 'NotInstalled' } }
