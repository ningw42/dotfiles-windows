# https://github.com/eza-community/eza-themes/blob/main/themes/everforest-dark-medium.yml
# everforest dark medium palette
# bg:             #2d353b
# red:            #e67e80
# green:          #a7c080
# yellow:         #dbbc7f
# blue:           #7fbbb3
# purple:         #d699b6
# aqua:           #83c092
# orange:         #e69875
# gray:           #859289
# fg:             #d3c6aa
colourful: true
filekinds:
  normal: {foreground: "#d3c6aa"}
  directory: {foreground: "#7fbbb3"}
  symlink: {foreground: "#83c092"}
  pipe: {foreground: "#859289"}
  block_device: {foreground: "#e67e80"}
  char_device: {foreground: "#e67e80"}
  socket: {foreground: "#859289"}
  special: {foreground: "#d699b6"}
  executable: {foreground: "#a7c080"}
  mount_point: {foreground: "#e69875"}
perms:
  user_read: {foreground: "#d3c6aa"}
  user_write: {foreground: "#dbbc7f"}
  user_execute_file: {foreground: "#a7c080"}
  user_execute_other: {foreground: "#a7c080"}
  group_read: {foreground: "#d3c6aa"}
  group_write: {foreground: "#dbbc7f"}
  group_execute: {foreground: "#a7c080"}
  other_read: {foreground: "#d3c6aa"}
  other_write: {foreground: "#dbbc7f"}
  other_execute: {foreground: "#a7c080"}
  special_user_file: {foreground: "#d699b6"}
  special_other: {foreground: "#859289"}
  attribute: {foreground: "#d3c6aa"}
size:
  major: {foreground: "#d3c6aa"}
  minor: {foreground: "#83c092"}
  number_byte: {foreground: "#d3c6aa"}
  number_kilo: {foreground: "#7fbbb3"}
  number_mega: {foreground: "#d699b6"}
  number_giga: {foreground: "#d699b6"}
  number_huge: {foreground: "#e69875"}
  unit_byte: {foreground: "#d3c6aa"}
  unit_kilo: {foreground: "#7fbbb3"}
  unit_mega: {foreground: "#d699b6"}
  unit_giga: {foreground: "#d699b6"}
  unit_huge: {foreground: "#e69875"}
users:
  user_root: {foreground: "#e67e80", is_bold: true}
  user_you: {foreground: "#a7c080", is_bold: true}
  user_other: {foreground: "#a7c080", is_dimmed: true}
  group_root: {foreground: "#e67e80", is_bold: true}
  group_yours: {foreground: "#a7c080", is_bold: true}
  group_other: {foreground: "#a7c080", is_dimmed: true}
links:
  normal: {foreground: "#83c092"}
  multi_link_file: {foreground: "#e69875"}
git:
  new: {foreground: "#a7c080"}
  modified: {foreground: "#dbbc7f"}
  deleted: {foreground: "#e67e80"}
  renamed: {foreground: "#83c092"}
  typechange: {foreground: "#d699b6"}
  ignored: {foreground: "#859289"}
  conflicted: {foreground: "#e67e80"}
git_repo:
  branch_main: {foreground: "#d3c6aa"}
  branch_other: {foreground: "#d699b6"}
  git_clean: {foreground: "#a7c080"}
  git_dirty: {foreground: "#e67e80"}
security_context:
  colon: {foreground: "#859289"}
  user: {foreground: "#d3c6aa"}
  role: {foreground: "#d699b6"}
  typ: {foreground: "#859289"}
  range: {foreground: "#d699b6"}
file_type:
  image: {foreground: "#dbbc7f"}
  video: {foreground: "#e67e80"}
  music: {foreground: "#a7c080"}
  lossless: {foreground: "#83c092"}
  crypto: {foreground: "#859289"}
  document: {foreground: "#d3c6aa"}
  compressed: {foreground: "#d699b6"}
  temp: {foreground: "#e67e80"}
  compiled: {foreground: "#7fbbb3"}
  build: {foreground: "#859289"}
  source: {foreground: "#7fbbb3"}
punctuation: {foreground: "#859289"}
date: {foreground: "#dbbc7f"}
inode: {foreground: "#d3c6aa"}
blocks: {foreground: "#859289"}
header: {foreground: "#d3c6aa"}
octal: {foreground: "#83c092"}
flags: {foreground: "#d699b6"}
symlink_path: {foreground: "#83c092"}
control_char: {foreground: "#7fbbb3"}
broken_symlink: {foreground: "#e67e80"}
broken_path_overlay: {foreground: "#859289"}
